<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Apple iPhone 17 Pro Max</title>

<style>
body{
margin:0;
font-family:-apple-system,Arial;
background:black;
color:white;
text-align:center;
}

/* Menü */
.nav{
background:#111;
padding:15px;
display:flex;
justify-content:center;
gap:25px;
color:#ccc;
font-size:14px;
}

.nav span:hover{
color:white;
cursor:pointer;
}

/* Giriş */
#login{
margin-top:80px;
}

input{
padding:10px;
font-size:16px;
background:black;
color:#0f0;
border:1px solid #0f0;
}

button{
padding:10px 20px;
background:#0f0;
border:none;
cursor:pointer;
}

/* Ana içerik */
#site{
display:none;
padding-top:60px;
}

h1{
font-size:45px;
}

.subtitle{
color:#aaa;
}

/* Görsel */
img{
width:260px;
margin-top:30px;
border-radius:20px;
}

/* Fiyat */
.price{
font-size:40px;
margin-top:20px;
color:#00ffcc;
}

.small{
font-size:12px;
color:gray;
margin-top:10px;
}
</style>
</head>

<body>

<!-- Menü -->
<div class="nav">
<span>Store</span>
<span>Mac</span>
<span>iPhone</span>
<span>iPad</span>
<span>Watch</span>
</div>

<!-- Giriş -->
<div id="login">
<h2>Secure Access</h2>
<input id="sifre" placeholder="01010111">
<br><br>
<button onclick="kontrol()">Enter</button>
</div>

<!-- Site -->
<div id="site">
<h1>iPhone 17 Pro Max</h1>
<p class="subtitle">Titanium. Powerful. Next level.</p>

<img src="https://images.unsplash.com/photo-1598327105666-5b89351aff97?q=80&w=800&auto=format&fit=crop">

<div class="price" id="fiyat">119.999 TL</div>
<div class="small">*Made in Turkey</div>
</div>

<script>
function kontrol(){
var girilen = document.getElementById("sifre").value;

if(girilen === "01010111"){

document.getElementById("login").innerHTML = "Connecting...";

setTimeout(function(){
document.getElementById("login").style.display = "none";
document.getElementById("site").style.display = "block";

setTimeout(function(){
document.getElementById("fiyat").innerText = "200 TL";
},2000);

},1500);

}else{
alert("Wrong code!");
}
}
</script>

</body>
  </html>
