<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone 17 Pro Max</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(black, #0a0a0a);
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #login-screen {
            text-align: center;
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0,255,0,0.4);
        }

        input {
            padding: 12px;
            margin-top: 15px;
            border-radius: 10px;
            border: none;
            text-align: center;
        }

        button {
            padding: 12px 25px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            background: #00ff99;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        #main-content {
            display: none;
            text-align: center;
        }

        img {
            width: 260px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            margin-top: 20px;
        }

        #fiyat {
            font-size: 28px;
            margin-top: 20px;
        }

        .error-msg {
            color: red;
            display: none;
        }
    </style>
</head>

<body>

<div id="login-screen">
    <h2>GİRİŞ PANELİ</h2>
    <p>Şifre gir:</p>
    <input type="password" id="passInput" placeholder="********">
    <br>
    <button onclick="checkPassword()">GİRİŞ</button>
    <p id="error" class="error-msg">Hatalı şifre!</p>
</div>

<div id="main-content">
    <h1>iPhone 17 Pro Max</h1>

    <img src="https://images.unsplash.com/photo-1603899122875-3c0f2c4f3d6b?q=80&w=800&auto=format&fit=crop">

    <h2 id="fiyat">119.999 TL</h2>
</div>

<script>
function checkPassword() {
    const input = document.getElementById("passInput").value;

    if (input === "01010111") {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("main-content").style.display = "block";

        setTimeout(function() {
            document.getElementById("fiyat").innerText = "200 TL";
            document.getElementById("fiyat").style.color = "lime";
        }, 2000);
    } else {
        document.getElementById("error").style.display = "block";
    }
}

document.getElementById("passInput").addEventListener("keyup", function(event) {
    if (event.key === "Enter") {
        checkPassword();
    }
});
</script>

</body>
</html>
