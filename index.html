<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhone 17 Pro Max</title>

<style>
body {
    margin:0;
    padding:0;
    overflow:hidden;
    font-family:Arial;
    background:black;
    color:white;
}

/* MATRIX */
#bgCanvas {
    position: fixed;
    top:0;
    left:0;
    z-index:0;
}

/* ÜST MENÜ */
.nav {
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,0.8);
    padding:15px;
    text-align:center;
    z-index:20;
    backdrop-filter: blur(10px);
}

/* GİRİŞ */
#login-screen {
    position:relative;
    z-index:10;
    text-align:center;
    margin-top:120px;
}

input {
    padding:10px;
    margin-top:10px;
}

button {
    padding:10px 20px;
    margin-top:10px;
    cursor:pointer;
}

/* ANA İÇERİK */
#main-content {
    display:none;
    position:relative;
    z-index:10;
    text-align:center;
    margin-top:120px;
}

img {
    width:260px;
    border-radius:20px;
    margin-top:20px;
}

/* SON 1 ADET */
.stock {
    color:red;
    font-weight:bold;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity:0; }
}

/* FİYAT TİTREME */
.shake {
    animation: shake 0.4s;
}

@keyframes shake {
    0%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    50%{transform:translateX(5px);}
    75%{transform:translateX(-5px);}
    100%{transform:translateX(0);}
}

/* BUTON */
.buy-btn {
    background:lime;
    color:black;
    padding:15px;
    margin-top:20px;
    border:none;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- MATRIX -->
<canvas id="bgCanvas"></canvas>

<!-- MENÜ -->
<div class="nav"> Apple Store</div>

<!-- GİRİŞ -->
<div id="login-screen">
<h2>Şifre gir</h2>
<input type="password" id="passInput">
<br>
<button onclick="checkPassword()">GİRİŞ</button>
<p id="error" style="color:red;display:none;">Hatalı şifre!</p>
</div>

<!-- ANA SAYFA -->
<div id="main-content">
<h1>iPhone 17 Pro Max</h1>

<img src="https://upload.wikimedia.org/wikipedia/commons/1/15/Apple_iPhone_15_Pro_Max_Blue_Titanium.svg">

<p class="stock">⚠️ SON 1 ADET!</p>

<h2 id="fiyat">119.999 TL</h2>

<button class="buy-btn" onclick="fakeBuy()">SATIN AL</button>
</div>

<script>
// MATRIX
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = "01";
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function drawMatrix(){
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#0F0";
    ctx.font = fontSize + "px monospace";

    for(let i=0;i<drops.length;i++){
        const text = chars.charAt(Math.floor(Math.random()*chars.length));
        ctx.fillText(text, i*fontSize, drops[i]*fontSize);

        if(drops[i]*fontSize > canvas.height && Math.random()>0.975){
            drops[i]=0;
        }
        drops[i]++;
    }
}

setInterval(drawMatrix,35);

window.addEventListener("resize", function(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

// ŞİFRE
function checkPassword(){
    const val = document.getElementById("passInput").value;

    if(val === "01010111"){
        document.getElementById("login-screen").style.display="none";
        document.getElementById("main-content").style.display="block";

        setTimeout(()=>{
            document.getElementById("fiyat").innerText="200 TL";
            document.getElementById("fiyat").classList.add("shake");
        },2000);

    } else {
        document.getElementById("error").style.display="block";
    }
}

// ENTER TUŞU
document.getElementById("passInput").addEventListener("keyup", function(e){
    if(e.key==="Enter"){
        checkPassword();
    }
});

// SAHTE SATIN AL
function fakeBuy(){
    alert("ÖDEME BAŞARISIZ ❌");
}
</script>

</body>
</html>
